name: Publish NuGet Package

on:
  push:
    branches:
      - main
    paths:
      - src/**

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          [xml]$project = Get-Content 'src/Sdcb.MiniWinForm/Sdcb.MiniWinForm.csproj'
          $prefix = @($project.Project.PropertyGroup | Where-Object { $_.VersionPrefix } | ForEach-Object { $_.VersionPrefix })[0]

          if ([string]::IsNullOrWhiteSpace($prefix)) {
            throw 'VersionPrefix was not found in src/Sdcb.MiniWinForm/Sdcb.MiniWinForm.csproj.'
          }

          $packageVersion = "$prefix.$env:RUN_NUMBER"
          "prefix=$prefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore src/Sdcb.MiniWinForm/Sdcb.MiniWinForm.csproj

      - name: Build
        run: dotnet build src/Sdcb.MiniWinForm/Sdcb.MiniWinForm.csproj -c Release --no-restore /p:Version=${{ steps.version.outputs.package_version }}

      - name: Pack
        run: dotnet pack src/Sdcb.MiniWinForm/Sdcb.MiniWinForm.csproj -c Release --no-build -o artifacts /p:Version=${{ steps.version.outputs.package_version }} /p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate